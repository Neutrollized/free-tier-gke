# YAML anchor
ksa_name: &serviceAccountName "harbor-wi-ksa"

expose:
  type: ingress
  tls:
    enabled: false
    certSource: none
  ingress:
    hosts:
      core: ""
    controller: gce
    annotations:
      kubernetes.io/ingress.class: "gce"
      kubernetes.io/ingress.allow-http: "true"

externalURL: ""

persistence:
  resourcePolicy: ""
  imageChartStorage:
    type: gcs
    gcs:
      bucket: harbor-test-gyu
      useWorkloadIdentity: true

harborAdminPassword: "Harbor12345"

nginx:
  serviceAccountName: *serviceAccountName

portal:
  serviceAccountName: *serviceAccountName

core:
  serviceAccountName: *serviceAccountName

jobservices:
  serviceAccountName: *serviceAccountName

registry:
  serviceAccountName: *serviceAccountName

trivy:
  enabled: false
  serviceAccountName: *serviceAccountName
  severity: "HIGH,CRITICAL"
  insecure: true

database:
  serviceAccountName: *serviceAccountName

redis:
  serviceAccountName: *serviceAccountName

exporter:
  serviceAccountName: *serviceAccountName
